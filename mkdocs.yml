site_name: YSharp Documentation
site_description: Documentation for the YSharp language and tooling
site_author: xXrederXx

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.copyright

markdown_extensions:
  - codehilite
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

docs_dir: Docs

extra:
  last_updated: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xXrederXx/ysharp

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

copyright: >
  © 2026 xXrederXx — Licensed under GPL-3.0

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: false
