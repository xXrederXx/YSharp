site_name: YSharp Documentation
site_description: Documentation for the YSharp language and tooling
site_author: xXrederXx

theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.copyright

markdown_extensions:
  - codehilite
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: Docs

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Shell: getting-started/shell.md
    - Hello World: getting-started/hello-world.md
  - Language Reference:
    - Keywords: language-reference/keywords/index.md

extra:
  last_updated: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xXrederXx/ysharp

copyright: >
  © 2026 xXrederXx — Licensed under GPL-3.0

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
