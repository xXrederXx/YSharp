name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore YSharp.sln

    - name: Check formatting
      run: dotnet format YSharp.sln --verify-no-changes

    - name: Build
      run: dotnet build YSharp.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test YSharp.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
